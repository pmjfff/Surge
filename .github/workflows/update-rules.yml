name: Surge Rules

# 触发器配置：定义工作流何时运行
on:
  schedule:
    # 定时任务：每天 UTC 时间 23:00 执行
    - cron: '0 23 * * *'
  # 允许在 GitHub 网页端的 Actions 面板中手动点击 "Run workflow" 按钮触发更新
  workflow_dispatch:

# 权限配置：赋予 Action 写入当前仓库代码的权限
permissions:
  contents: write

# 任务定义：包含一个名为 update-rules 的具体执行流
jobs:
  update-rules:
    # 运行环境：指定分配一台 GitHub 官方托管的最新版 Ubuntu Linux 虚拟机来执行脚本
    runs-on: ubuntu-latest
    steps:
      # 步骤 1：检出代码
      # 将现有仓库 (Rabbit-Spec/Surge) 的代码下载到当前的虚拟机运行环境中
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 步骤 2：下载规则、注入自定义头部、重命名并归档
      - name: Download, Add Custom Header and Rename Rules
        run: |
          # 在当前虚拟机的仓库根目录下创建 Rules 文件夹（-p 参数确保目录已存在时不会报错）
          mkdir -p Rules
          
          # 定义上游规则文件的精确基础 URL 路径
          BASE_URL="https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release/ruleset"
          
          # 获取系统时间，强制转换为北京时间（Asia/Shanghai），并格式化为 YYYY-MM-DD HH:MM:SS
          UPDATE_TIME=$(TZ="Asia/Shanghai" date +"%Y-%m-%d %H:%M:%S")
          
          # 封装核心处理函数，用于批量标准化输出规则文件
          # 函数接收三个参数：
          # $1: 上游原始文件名 (如 direct.txt)
          # $2: 本地保存的新文件名 (如 My_Direct.list)
          # $3: 规则展示名称 (用于动态写入文件头部的 NAME 字段)
          process_rule() {
            local source_file=$1
            local target_name=$2
            local display_name=$3
            
            # 头部注入逻辑：使用单大于号 (>) 创建新文件并覆盖写入首行
            echo "# NAME: $display_name" > "Rules/$target_name"
            # 使用双大于号 (>>) 向文件尾部追加写入后续信息
            echo "# AUTHOR: Rabbit-Spec" >> "Rules/$target_name"
            echo "# REPO: https://github.com/Rabbit-Spec/Surge" >> "Rules/$target_name"
            echo "# UPDATED: $UPDATE_TIME" >> "Rules/$target_name"
            
            # 数据抓取逻辑：使用 curl 静默下载 (-s) 并跟随重定向 (-L) 上游规则纯文本
            # 将抓取到的数万行规则全部追加 (>>) 到刚才写好的头部信息下方
            curl -sL "$BASE_URL/$source_file" >> "Rules/$target_name"
          }
          
          # 执行函数，分别映射并生成你指定需要的三个 RULE-SET 文件
          process_rule "direct.txt" "China.list" "China"
          process_rule "proxy.txt" "Proxy.list" "Proxy"
          process_rule "cncidr.txt" "ChinaIPs.list" "ChinaIPs"

      # 步骤 3：Git 提交与推送到远程仓库
      - name: Commit and Push Changes
        run: |
          # 配置 Git 本地提交者的身份信息（声明这是一个自动化的机器人提交）
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 精准控制暂存区：仅将 Rules/ 目录下的所有文件变动添加到 Git 暂存区
          # 此操作逻辑上隔离了仓库根目录的其他文件，确保绝对不会篡改你现有的其他配置
          git add Rules/
          
          # 提交判定：检查暂存区是否存在内容差异
          # 由于 UPDATED 时间戳每天都在变化，此处的 diff 判定每天都会通过
          if ! git diff --staged --quiet; then
            # 固化版本并强制推送到你的远端主分支
            git commit -m "Auto-update Surge RULE-SETs from ruleset dir"
            git push
          fi
