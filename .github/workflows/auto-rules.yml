name: Auto Surge Rules

# 触发器配置
on:
  schedule:
    # 定时任务：每天 UTC 时间 23:00 执行（北京时间 07:00）
    - cron: '0 23 * * *'
  # 允许手动触发
  workflow_dispatch:

# 权限配置
permissions:
  contents: write

jobs:
  update-rules:
    runs-on: ubuntu-latest
    
    # 强制所有 JavaScript Actions 使用 Node.js 24
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      # 步骤 1：检出代码
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 步骤 2：下载、合并手动规则、注入头部并归档
      - name: Download, Merge Custom Rules and Rename
        run: |
          # 创建输出目录及手动规则存储目录
          mkdir -p Rules/Manual
          
          # 获取北京时间
          UPDATE_TIME=$(TZ="Asia/Shanghai" date +"%Y-%m-%d %H:%M:%S")
          
          # 封装处理函数
          process_rule() {
            local source_file=$1
            local target_name=$2
            local display_name=$3
            
            # 写入四行 Header 和一个空行
            echo "# NAME: $display_name" > "Rules/$target_name"
            echo "# AUTHOR: Rabbit-Spec" >> "Rules/$target_name"
            echo "# REPO: https://github.com/Rabbit-Spec/Surge" >> "Rules/$target_name"
            echo "# UPDATED: $UPDATE_TIME" >> "Rules/$target_name"
            echo "" >> "Rules/$target_name"
            
            # 核心合并逻辑：读取 Rules/Manual 目录下的对应手动规则文件
            local filename_no_ext="${target_name%.*}"
            local manual_file="Rules/Manual/${filename_no_ext}.txt"
            
            if [ -f "$manual_file" ]; then
              echo "# ======= 手动维护规则 ========" >> "Rules/$target_name"
              cat "$manual_file" >> "Rules/$target_name"
              echo "" >> "Rules/$target_name"
            fi
            
            # 追加上游自动同步的规则内容
            echo "# ======= 上游同步规则 ========" >> "Rules/$target_name"
            curl -sL "$BASE_URL/$source_file" >> "Rules/$target_name"
          }
          
          # --- 第一部分：Loyalsoldier 仓库规则 ---
          BASE_URL="https://raw.githubusercontent.com/Loyalsoldier/surge-rules/release"
          process_rule "proxy.txt" "Proxy.list" "Proxy"
          process_rule "direct.txt" "China.list" "China"
          process_rule "cncidr.txt" "ChinaCIDR.list" "ChinaCIDR"
          
          # --- 第二部分：EAlyce 仓库规则 ---
          BASE_URL="https://raw.githubusercontent.com/EAlyce/conf/refs/heads/main/Rule"
          process_rule "OpenAI.list" "AIGC.list" "AIGC"

      # 步骤 3：Git 提交与推送到远程仓库
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add Rules/
          
          if ! git diff --staged --quiet; then
            COMMIT_DATE=$(TZ="Asia/Shanghai" date +"%Y.%m.%d")
            git commit -m "$COMMIT_DATE Auto-update Surge Rules from multi-sources"
            git push
          fi
